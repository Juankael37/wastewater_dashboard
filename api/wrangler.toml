name = "wastewater-api"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Non-secret config. Replace SUPABASE_URL after you create the project.
# For SUPABASE_ANON_KEY use a secret (not committed):
#   cd api && npx wrangler secret put SUPABASE_ANON_KEY
[vars]
SUPABASE_URL = "https://YOUR_PROJECT_REF.supabase.co"
ALLOWED_ORIGINS = "http://localhost:5173,http://127.0.0.1:5173"

# Optional: production-only vars (uncomment and set your real URLs)
# [env.production.vars]
# SUPABASE_URL = "https://xxxx.supabase.co"
# ALLOWED_ORIGINS = "https://your-frontend.pages.dev,http://localhost:5173"
