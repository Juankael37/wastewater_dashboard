
{% extends "base.html" %}

{% block content %}

<h2 class="text-3xl font-semibold mb-6">Reports</h2>

<div class="bg-slate-800 p-6 rounded-xl">

    <a href="/export/pdf"
   class="bg-teal-500 px-4 py-2 rounded hover:bg-teal-600 mb-4 inline-block">
    Download PDF
</a>

    <table class="w-full text-center">
        <thead class="text-gray-400 border-b border-slate-700">
            <tr>
                <th>Time</th>
                <th>pH</th>
                <th>COD</th>
                <th>BOD</th>
                <th>TSS</th>
            </tr>
        </thead>
        <tbody>
            {% for row in data %}
            <tr class="border-b border-slate-700">
                <td>{{ row.timestamp }}</td>
                <td>{{ row.ph }}</td>
                <td>{{ row.cod }}</td>
                <td>{{ row.bod }}</td>
                <td>{{ row.tss }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

{% endblock %}
