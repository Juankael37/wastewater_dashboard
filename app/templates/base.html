<!DOCTYPE html>
<html>
<head>
    <title>Wastewater Dashboard</title>

    <!-- Tailwind Dark Mode Config -->
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-white text-black dark:bg-slate-900 dark:text-white transition">

<div class="flex">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-gray-100 dark:bg-slate-800 min-h-screen p-6 flex flex-col shadow-lg">

        <!-- Logo -->
        <h1 class="text-2xl font-bold text-teal-500 mb-10">
            AquaDash
        </h1>

        <!-- Navigation -->
        <nav class="space-y-2 text-sm">

            <!-- Dashboard -->
            <a href="/"
               class="flex items-center gap-3 px-4 py-2 rounded-lg transition
               {{ 'bg-gray-200 dark:bg-slate-700 text-teal-500' if request.path == '/' else 'text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-slate-700 hover:text-teal-500' }}">
                <i data-lucide="layout-dashboard"></i>
                Dashboard
            </a>

            <!-- Reports -->
            <a href="/reports"
               class="flex items-center gap-3 px-4 py-2 rounded-lg transition
               {{ 'bg-gray-200 dark:bg-slate-700 text-teal-500' if request.path.startswith('/reports') else 'text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-slate-700 hover:text-teal-500' }}">
                <i data-lucide="bar-chart-3"></i>
                Reports
            </a>


            <!-- Alerts -->
            <a href="/alerts"
               class="flex items-center gap-3 px-4 py-2 rounded-lg transition
               {{ 'bg-red-500 text-white' if request.path.startswith('/alerts') else 'text-gray-600 dark:text-gray-300 hover:bg-red-500 hover:text-white' }}">
                <i data-lucide="alert-triangle"></i>
                Alerts
            </a>

            <!-- Settings (Admin Only) -->
            {% if current_user.is_authenticated and (current_user.id == 1 or current_user.id == '1') %}
            <a href="/settings"
               class="flex items-center gap-3 px-4 py-2 rounded-lg transition
               {{ 'bg-gray-200 dark:bg-slate-700 text-teal-500' if request.path.startswith('/settings') else 'text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-slate-700 hover:text-teal-500' }}">
                <i data-lucide="settings"></i>
                Settings
            </a>
            {% endif %}

        </nav>

        <!-- Spacer -->
        <div class="flex-grow"></div>

        <!-- Logout -->
        <a href="/logout"
           class="flex items-center gap-3 px-4 py-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-red-600 hover:text-white transition">
            <i data-lucide="log-out"></i>
            Logout
        </a>

    </aside>

    <!-- MAIN CONTENT -->
    <div class="flex-1 flex flex-col">

        <!-- TOP BAR -->
        <header class="bg-gray-100 dark:bg-slate-800 px-6 py-4 flex justify-between items-center border-b border-gray-300 dark:border-slate-700 sticky top-0 z-10">

            <h2 class="text-lg font-semibold">
                Wastewater Monitoring System
            </h2>

            <div class="flex items-center gap-4">

                <!-- 🌗 Theme Toggle -->
                <button onclick="toggleTheme()"
                    class="bg-gray-200 dark:bg-slate-700 px-3 py-2 rounded-lg text-sm hover:opacity-80 transition">
                    🌗
                </button>

                <!-- User -->
                <div class="text-sm text-gray-500 dark:text-gray-400">
                    Logged in
                </div>

            </div>

        </header>

        <!-- PAGE CONTENT -->
        <main class="flex-1 p-8">
            {% block content %}{% endblock %}
        </main>

    </div>

</div>

<!-- Scripts -->
<script>
    lucide.createIcons();

    function toggleTheme() {
        document.documentElement.classList.toggle("dark");
    }
</script>

</body>
</html>
