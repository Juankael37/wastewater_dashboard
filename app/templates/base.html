
<!DOCTYPE html>
<html>
<head>
    <title>Wastewater Dashboard</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-slate-900 text-white">

<div class="flex">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-slate-800 min-h-screen p-6 flex flex-col">

        <!-- Logo -->
        <h1 class="text-2xl font-bold text-teal-400 mb-8">AquaDash</h1>

        <!-- Navigation -->
        <nav class="space-y-2">

            <a href="/"
               class="flex items-center gap-2 px-3 py-2 rounded-lg transition
               {{ 'bg-slate-700 text-teal-400' if request.path == '/' else 'text-gray-300 hover:bg-slate-700 hover:text-teal-400' }}">
                <i data-lucide="layout-dashboard"></i>
                Dashboard
            </a>

            <a href="/reports"
               class="flex items-center gap-2 px-3 py-2 rounded-lg transition
               {{ 'bg-slate-700 text-teal-400' if request.path == '/reports' else 'text-gray-300 hover:bg-slate-700 hover:text-teal-400' }}">
                <i data-lucide="bar-chart-3"></i>
                Reports
            </a>

            <a href="/input"
               class="flex items-center gap-2 px-3 py-2 rounded-lg transition
               {{ 'bg-slate-700 text-teal-400' if request.path == '/input' else 'text-gray-300 hover:bg-slate-700 hover:text-teal-400' }}">
                <i data-lucide="plus-circle"></i>
                Input Data
            </a>

        </nav>

        <!-- Spacer -->
        <div class="flex-grow"></div>

        <!-- Logout -->
        <a href="/logout"
           class="flex items-center gap-2 px-3 py-2 rounded-lg text-gray-300 hover:bg-red-500 hover:text-white transition">
            <i data-lucide="log-out"></i>
            Logout
        </a>

    </aside>

    <!-- MAIN CONTENT -->
    <div class="flex-1 flex flex-col">

        <!-- TOP BAR -->
        <header class="bg-slate-800 px-6 py-4 flex justify-between items-center border-b border-slate-700">

            <h2 class="text-lg font-semibold">
                Wastewater Monitoring System
            </h2>

            <div class="text-sm text-gray-400">
                Logged in
            </div>

        </header>

        <!-- PAGE CONTENT -->
        <main class="flex-1 p-8">
            {% block content %}{% endblock %}
        </main>

    </div>

</div>

<!-- Activate Icons -->
<script>
    lucide.createIcons();
</script>

</body>
</html>
