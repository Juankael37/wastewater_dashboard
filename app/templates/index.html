{% extends "base.html" %}

{% block content %}

<div class="flex justify-between items-center mb-6">
    <h2 class="text-3xl font-semibold">Dashboard Overview</h2>

    <div class="flex gap-2">
        <select id="filter" class="bg-slate-800 p-2 rounded">
            <option value="all">All</option>
            <option value="today">Today</option>
            <option value="7days">Last 7 Days</option>
        </select>

        <a href="/export/pdf" class="bg-teal-500 px-4 py-2 rounded hover:bg-teal-600">
            Export
        </a>
    </div>
</div>

<div id="alertBox" class="mb-4"></div>

<!-- KPI -->
<div class="grid grid-cols-4 gap-6 mb-8">
    <div class="bg-slate-800 p-6 rounded-xl text-center">
        <p class="text-gray-400">pH</p>
        <h3 id="phVal" class="text-2xl font-bold text-teal-400">-</h3>
    </div>
    <div class="bg-slate-800 p-6 rounded-xl text-center">
        <p class="text-gray-400">COD</p>
        <h3 id="codVal" class="text-2xl font-bold text-red-400">-</h3>
    </div>
    <div class="bg-slate-800 p-6 rounded-xl text-center">
        <p class="text-gray-400">BOD</p>
        <h3 id="bodVal" class="text-2xl font-bold text-green-400">-</h3>
    </div>
    <div class="bg-slate-800 p-6 rounded-xl text-center">
        <p class="text-gray-400">TSS</p>
        <h3 id="tssVal" class="text-2xl font-bold text-orange-400">-</h3>
    </div>
</div>

<!-- TABLE -->
<div class="bg-slate-800 p-6 rounded-xl mb-8 overflow-auto">
    <table class="w-full text-center">
        <thead class="text-gray-400 border-b border-slate-700">
            <tr>
                <th>Time</th><th>pH</th><th>COD</th><th>BOD</th><th>TSS</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<!-- CHARTS -->
<div class="grid grid-cols-2 gap-6">
    <div class="bg-slate-800 p-4 rounded-xl"><canvas id="phChart"></canvas></div>
    <div class="bg-slate-800 p-4 rounded-xl"><canvas id="codChart"></canvas></div>
    <div class="bg-slate-800 p-4 rounded-xl"><canvas id="bodChart"></canvas></div>
    <div class="bg-slate-800 p-4 rounded-xl"><canvas id="tssChart"></canvas></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
let charts = {};

async function loadData() {
    const res = await fetch('/api/data');
    const data = await res.json();

    updateUI(data);
}

function updateUI(data) {
    if (!data.labels.length) return;

    let lastIndex = data.labels.length - 1;

    // KPI
    phVal.innerText = data.ph[lastIndex];
    codVal.innerText = data.cod[lastIndex];
    bodVal.innerText = data.bod[lastIndex];
    tssVal.innerText = data.tss[lastIndex];

    // ALERT
    let alertHTML = "";
    if (
        data.ph[lastIndex] > 9 || data.ph[lastIndex] < 6 ||
        data.cod[lastIndex] > 100 ||
        data.bod[lastIndex] > 50 ||
        data.tss[lastIndex] > 100
    ) {
        alertHTML = `<div class="bg-red-500 p-3 rounded">⚠ Critical Water Quality Detected!</div>`;
    }
    document.getElementById("alertBox").innerHTML = alertHTML;

    // TABLE
    let html = "";
    for (let i = 0; i < data.labels.length; i++) {
        html += `
        <tr class="border-b border-slate-700">
            <td>${data.labels[i].slice(11,19)}</td>
            <td>${data.ph[i]}</td>
            <td>${data.cod[i]}</td>
            <td>${data.bod[i]}</td>
            <td>${data.tss[i]}</td>
        </tr>`;
    }
    tableBody.innerHTML = html;

    updateCharts(data);
}

function createChart(id, label, values, color) {
    if (charts[id]) charts[id].destroy();

    charts[id] = new Chart(document.getElementById(id), {
        type: 'line',
        data: {
            labels: values.timestamps,
            datasets: [{
                label: label,
                data: values.data,
                borderColor: color,
                tension: 0.4
            }]
        }
    });
}

function updateCharts(data) {
    createChart("phChart", "pH", {timestamps: data.labels, data: data.ph}, "#2dd4bf");
    createChart("codChart", "COD", {timestamps: data.labels, data: data.cod}, "#f87171");
    createChart("bodChart", "BOD", {timestamps: data.labels, data: data.bod}, "#4ade80");
    createChart("tssChart", "TSS", {timestamps: data.labels, data: data.tss}, "#fb923c");
}

// AUTO REFRESH
setInterval(loadData, 5000);
loadData();
</script>

{% endblock %}
