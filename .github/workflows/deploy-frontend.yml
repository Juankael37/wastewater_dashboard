name: Build and Verify Frontend

# NOTE: Cloudflare Pages deploys automatically via Git integration when code
# is pushed to main. This workflow only verifies the build succeeds.
# Production promotion happens automatically through Cloudflare's Git integration.
# See: Cloudflare Dashboard → wastewater-dashboard → Settings → Build & deployments

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (verify no errors)
        working-directory: frontend
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || 'https://pkyazsrbhjtxbpwsxbwe.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || '' }}
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://wastewater-api.juankael37.workers.dev' }}
        run: npm run build

      - name: Check build output exists
        run: test -f frontend/dist/index.html && echo "✅ Build output verified" || (echo "❌ Build output missing" && exit 1)

