name: Deploy Frontend to Cloudflare Pages

# This project uses Direct Upload (wrangler pages deploy) NOT Git integration.
# Since the Cloudflare project's production branch is set to "main",
# deploying with --branch=main correctly advances the production alias.

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        # VITE_ vars are read from frontend/.env.production automatically by Vite.
        # Do NOT pass vars.VITE_API_URL here — it had a typo in GitHub that overrode
        # the correct value in .env.production.
        run: npm run build

      - name: Deploy to Cloudflare Pages (Production)
        working-directory: frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # --branch=main maps to the production alias because the project's
        # production branch is configured as "main" in Cloudflare dashboard.
        run: npx wrangler@3 pages deploy dist --project-name=wastewater-dashboard --branch=main


