<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaDash Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="w-full max-w-md">
        <div class="bg-white rounded-lg shadow-xl p-8">
            <!-- Logo -->
            <h1 class="text-4xl font-bold text-center text-teal-500 mb-8">
                AquaDash
            </h1>

            <!-- Title -->
            <h2 class="text-2xl font-bold text-gray-900 mb-2 text-center">
                Admin Dashboard
            </h2>
            <p class="text-gray-600 text-center mb-6">
                Wastewater Monitoring System
            </p>

            <!-- Login Form -->
            <form id="login-form" class="space-y-4">
                <!-- Email -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Email Address
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        required 
                        class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-teal-500 focus:border-transparent outline-none transition"
                        placeholder="admin@example.com"
                    >
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Password
                    </label>
                    <input 
                        type="password" 
                        id="password" 
                        required 
                        class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-teal-500 focus:border-transparent outline-none transition"
                        placeholder="••••••••"
                    >
                </div>

                <!-- Error Message -->
                <div id="error-message" class="bg-red-100 text-red-800 p-3 rounded hidden"></div>

                <!-- Submit Button -->
                <button 
                    type="submit" 
                    id="submit-btn"
                    class="w-full bg-teal-500 text-white py-2 rounded-lg font-semibold hover:bg-teal-600 transition disabled:opacity-50 disabled:cursor-not-allowed"
                >
                    Sign In
                </button>
            </form>

            <!-- Info -->
            <div class="mt-6 p-4 bg-blue-50 rounded-lg border border-blue-200">
                <p class="text-sm text-blue-800">
                    <span class="font-semibold">Admin Access Only</span><br>
                    This dashboard is for administrators and authorized users only.
                </p>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-white text-sm mt-6 opacity-75">
            © 2026 Wastewater Monitoring System. All rights reserved.
        </p>
    </div>

    <script src="./js/api.js"></script>
    <script>
        // Initialize theme
        function initTheme() {
            const isDark = localStorage.getItem('aquadash-theme') === 'dark';
            if (isDark) {
                document.documentElement.classList.add('dark');
            }
        }

        initTheme();

        // Prevent redirect loop with flag - VERY STRICT
        let authCheckStarted = false;
        let authCheckCompleted = false;

        // Check auth on page load (only once)
        document.addEventListener('DOMContentLoaded', async () => {
            // PREVENT MULTIPLE CHECKS
            if (authCheckStarted) return;
            authCheckStarted = true;

            try {
                console.log('[AquaDash] Checking authentication...');
                const auth = await api.checkAuth();
                
                if (auth.authenticated && api.isAdmin()) {
                    console.log('[AquaDash] User is authenticated and admin. Redirecting to dashboard...');
                    authCheckCompleted = true;
                    window.location.href = './index.html';
                    return;
                } else {
                    console.log('[AquaDash] User not authenticated or not admin. Showing login form.');
                }
            } catch (error) {
                console.log('[AquaDash] Auth check failed:', error.message);
                // Clear invalid token to prevent loop
                localStorage.removeItem('aq_access_token');
                localStorage.removeItem('aq_current_user');
                console.log('[AquaDash] Cleared invalid tokens. Ready for login.');
            }
            
            authCheckCompleted = true;
        });

        // Handle login
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submit-btn');
            const errorMsg = document.getElementById('error-message');

            // Clear error
            errorMsg.classList.add('hidden');
            errorMsg.textContent = '';

            // Disable button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';

            try {
                console.log('[AquaDash] Attempting login for:', email);
                await api.login(email, password);
                
                // TEMPORARY: Skip admin check for testing
                // TODO: Re-enable this after setting admin role in Supabase
                // if (!api.isAdmin()) {
                //     throw new Error('Admin access required to use AquaDash');
                // }

                console.log('[AquaDash] Login successful. Redirecting to dashboard...');
                // Redirect to dashboard
                window.location.href = './index.html';
            } catch (error) {
                console.error('[AquaDash] Login error:', error.message);
                errorMsg.textContent = error.message || 'Login failed. Please try again.';
                errorMsg.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
