<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaDash - Wastewater Monitoring Admin</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        [data-page] { display: none; }
        [data-page].active { display: block; }
        
        .chart-container {
            position: relative;
            height: 400px;
            margin: 20px 0;
        }
    </style>
</head>
<body class="bg-white text-black dark:bg-slate-900 dark:text-white transition">
    <div class="flex h-screen">
        <!-- SIDEBAR -->
        <aside class="w-64 bg-gray-100 dark:bg-slate-800 min-h-screen p-6 flex flex-col shadow-lg overflow-y-auto">
            <!-- Logo -->
            <h1 class="text-2xl font-bold text-teal-500 mb-10">
                AquaDash
            </h1>

            <!-- Navigation -->
            <nav class="space-y-2 text-sm">
                <!-- Dashboard -->
                <button data-nav="dashboard" class="nav-btn w-full flex items-center gap-3 px-4 py-2 rounded-lg transition text-left
                    bg-gray-200 dark:bg-slate-700 text-teal-500">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                    Dashboard
                </button>

                <!-- Reports -->
                <button data-nav="reports" class="nav-btn w-full flex items-center gap-3 px-4 py-2 rounded-lg transition text-left
                    text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-slate-700 hover:text-teal-500">
                    <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
                    Reports
                </button>

                <!-- Alerts -->
                <button data-nav="alerts" class="nav-btn w-full flex items-center gap-3 px-4 py-2 rounded-lg transition text-left
                    text-gray-600 dark:text-gray-300 hover:bg-red-500 hover:text-white">
                    <i data-lucide="alert-triangle" class="w-5 h-5"></i>
                    Alerts
                </button>

                <!-- Settings (Admin Only) -->
                <button data-nav="settings" class="nav-btn nav-admin w-full flex items-center gap-3 px-4 py-2 rounded-lg transition text-left
                    text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-slate-700 hover:text-teal-500">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                    Settings
                </button>
            </nav>

            <!-- Spacer -->
            <div class="flex-grow"></div>

            <!-- User Info -->
            <div class="mb-4 p-3 rounded bg-gray-200 dark:bg-slate-700 text-sm">
                <p class="font-semibold" id="user-name">Loading...</p>
                <p class="text-gray-600 dark:text-gray-400 text-xs" id="user-role">-</p>
            </div>

            <!-- Logout -->
            <button id="logout-btn" class="w-full flex items-center gap-3 px-4 py-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-red-600 hover:text-white transition">
                <i data-lucide="log-out" class="w-5 h-5"></i>
                Logout
            </button>
        </aside>

        <!-- MAIN CONTENT -->
        <div class="flex-1 flex flex-col">
            <!-- TOP BAR -->
            <header class="bg-gray-100 dark:bg-slate-800 px-6 py-4 flex justify-between items-center border-b border-gray-300 dark:border-slate-700 sticky top-0 z-10">
                <h2 class="text-lg font-semibold" id="page-title">Dashboard</h2>
                
                <div class="flex items-center gap-4">
                    <!-- Theme Toggle -->
                    <button id="theme-toggle" class="p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-slate-700">
                        <i data-lucide="moon" class="w-5 h-5"></i>
                    </button>
                </div>
            </header>

            <!-- PAGE CONTENT -->
            <main class="flex-1 overflow-y-auto p-6">
                <!-- Dashboard Page -->
                <div data-page="dashboard" class="active">
                    <div id="dashboard-content">Loading...</div>
                </div>

                <!-- Reports Page -->
                <div data-page="reports">
                    <div id="reports-content">Loading...</div>
                </div>

                <!-- Alerts Page -->
                <div data-page="alerts">
                    <div id="alerts-content">Loading...</div>
                </div>

                <!-- Settings Page -->
                <div data-page="settings" class="nav-admin-content">
                    <div id="settings-content">Loading...</div>
                </div>
            </main>
        </div>
    </div>

    <!-- Scripts -->
    <script src="./js/api.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./pages/dashboard.js"></script>
    <script src="./pages/reports.js"></script>
    <script src="./pages/alerts.js"></script>
    <script src="./pages/settings.js"></script>
    <script src="./app.js"></script>
</body>
</html>
